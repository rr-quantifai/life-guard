<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Life Guard I Life insurance advisory</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F7FB;--s1:#FFFFFF;--s2:#EDF0F8;--s3:#E2E6F2;--s4:#CDD3E8;
  --a:#0BAF88;--ad:#089070;--aa:rgba(11,175,136,.10);
  --tx:#1C2237;--t2:#4A5272;--t3:#98A3C0;
  --red:#DC3545;--gold:#9A6400;
  --bb:#FFFFFF;--bd:#D5DAF0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{height:100%;background:var(--bg);color:var(--tx);font-family:'Inter',ui-sans-serif,sans-serif;font-size:14px;line-height:1.5;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;max-width:600px;margin:0 auto}

/* ── messages ── */
#msgs{flex:1;overflow-y:auto;padding:20px 14px 8px;display:flex;flex-direction:column;gap:4px}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}
.row{display:flex;align-items:flex-end;gap:8px;animation:pop .22s ease}
.row.u{justify-content:flex-end}
.av{width:28px;height:28px;border-radius:50%;background:var(--aa);border:1.5px solid var(--a);display:grid;place-items:center;flex-shrink:0;color:var(--a)}
.av svg{width:13px;height:13px}
.bbl{max-width:80%;padding:11px;border-radius:14px;font-size:14px;line-height:1.6}
.row:not(.u) .bbl{background:var(--bb);border:1px solid var(--bd);border-bottom-left-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.row.u .bbl{background:var(--a);color:#0A1A15;font-weight:500;border-bottom-right-radius:3px}
.comp{margin-left:36px;margin-bottom:4px;animation:pop .22s ease}

/* ── typing ── */
#typing{display:none;align-items:flex-end;gap:8px;padding:0 14px 6px}
.tdots{background:var(--bb);border:1px solid var(--bd);border-radius:14px;border-bottom-left-radius:3px;padding:10px;display:flex;gap:5px;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.tdot{width:6px;height:6px;background:var(--s4);border-radius:50%;animation:bnc 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}

/* ── input bar ── */
#bar{padding:10px 12px;padding-bottom:max(14px,env(safe-area-inset-bottom));background:var(--bg);border-top:1px solid var(--bd)}
#bri{display:flex;align-items:center;gap:8px;background:var(--s1);border:1.5px solid var(--bd);border-radius:22px;padding:10px;transition:border-color .2s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
#bri:focus-within{border-color:var(--a)}
#inp{flex:1;background:none;border:none;outline:none;color:var(--tx);font:inherit;resize:none;max-height:90px;min-height:20px;line-height:1.4}
#inp::placeholder{color:var(--t3)}
#snd{width:32px;height:32px;border-radius:50%;background:var(--a);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .1s;color:#fff}
#snd:hover{background:var(--ad)}#snd:active{transform:scale(.94)}
#snd:disabled{background:var(--s4);cursor:default}
#snd svg{width:14px;height:14px}

/* ── card base ── */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:17px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card.done{opacity:.35;pointer-events:none}
.ctag{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ad);margin-bottom:13px;display:flex;align-items:center;gap:6px}

/* ── edit link ── */
.edit-link{display:none;width:100%;padding:7px;background:none;border:none;color:var(--t3);font:11px 'Inter',ui-sans-serif,sans-serif;cursor:pointer;align-items:center;justify-content:center;gap:5px;margin-top:3px;transition:color .2s}
.edit-link:hover{color:var(--a)}

/* ── plan options ── */
.plans{display:flex;flex-direction:column;gap:9px}
.po{display:flex;align-items:center;gap:12px;background:var(--s2);border:1.5px solid var(--bd);border-radius:12px;padding:13px;cursor:pointer;text-align:left;width:100%;transition:border-color .2s,background .2s}
.po:hover,.po.sel{border-color:var(--a);background:var(--aa)}
.po-ic{width:34px;height:34px;border-radius:9px;background:var(--aa);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--a);transition:background .2s}
.po:hover .po-ic,.po.sel .po-ic{background:rgba(11,175,136,.18)}
.pot{font-size:14px;font-weight:600;color:var(--tx)}
.pos{font-size:12px;color:var(--t2);margin-top:2px}

/* ── form fields ── */
.flds{display:flex;flex-direction:column;gap:9px}
.fi{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:9px;padding:12px;color:var(--tx);font:inherit;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.fi:focus{border-color:var(--a)}.fi.err{border-color:var(--red)}
.fi::placeholder{color:var(--t3)}
.pfxw{position:relative}
.pfx{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t2);pointer-events:none;font-size:13px}
.fi.pl{padding-left:44px}
.tgr{display:flex;align-items:center;justify-content:space-between;gap:8px}
.tgl{font-size:12px;color:var(--t2);flex-shrink:0}
.tg{display:flex;background:var(--s2);border:1.5px solid var(--bd);border-radius:8px;overflow:hidden}
.tb{flex:1;padding:9px;border:none;background:none;color:var(--t2);font:12px/1 'Inter',ui-sans-serif,sans-serif;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;justify-content:center}
.tb.on{background:var(--a);color:#fff}
.disc{font-size:10px;color:var(--t3);font-style:italic;display:flex;align-items:center;gap:5px}

/* ── sliders ── */
.slr{margin:14px 0}
.slh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.sll{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.slv{font-size:19px;font-weight:700;color:var(--tx)}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:var(--s4);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--a);cursor:pointer;box-shadow:0 0 0 4px var(--aa)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--a);border:none;cursor:pointer}
.sllm{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-top:3px}

/* ── quote display ── */
.qdiv{height:1px;background:var(--bd);margin:13px 0}
.qrow{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:9px}
.ql{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;font-weight:600}
.qv{font-size:17px;font-weight:700;color:var(--tx)}
.qs{font-size:10px;color:var(--t3);margin-top:1px}
.feat{background:var(--aa);border:1px solid rgba(11,175,136,.25);border-radius:9px;padding:11px;display:flex;gap:9px;align-items:flex-start;font-size:11px;color:var(--ad);line-height:1.6}
.feat svg{width:14px;height:14px;flex-shrink:0;margin-top:2px}

/* ── funds ── */
.fnds{display:flex;gap:7px;margin:9px 0}
.fnd{flex:1;padding:9px;background:var(--s2);border:1.5px solid var(--bd);border-radius:9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s}
.fnd.sel{border-color:var(--a);background:var(--aa)}
.fn{font-size:9px;font-weight:700;color:var(--t2);letter-spacing:.06em;margin-bottom:2px}
.fr{font-size:14px;font-weight:700;color:var(--a)}
.fs{font-size:9px;color:var(--t3);margin-top:1px}
.warn{background:rgba(154,100,0,.07);border:1px solid rgba(154,100,0,.22);border-radius:9px;padding:10px;display:flex;gap:8px;font-size:11px;color:var(--gold);line-height:1.6;align-items:flex-start}
.warn svg{width:14px;height:14px;flex-shrink:0;margin-top:2px}

/* ── buttons ── */
.btn{width:100%;padding:13px;background:var(--a);color:#fff;border:none;border-radius:11px;font:700 14px 'Inter',ui-sans-serif,sans-serif;cursor:pointer;margin-top:13px;transition:background .2s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{background:var(--ad)}.btn:active{transform:scale(.99)}
.btn:disabled{background:var(--s4);color:var(--t3);cursor:default;transform:none}
.btn svg{flex-shrink:0}
.gbtn{width:100%;padding:10px;background:none;border:1.5px solid var(--bd);border-radius:9px;color:var(--t2);font:13px 'Inter',ui-sans-serif,sans-serif;cursor:pointer;margin-top:8px;transition:border-color .2s,color .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.gbtn:hover{border-color:var(--a);color:var(--a)}

/* ── illustration ── */
.ilw{overflow:auto;border-radius:8px;max-height:230px}
.ilt{width:100%;border-collapse:collapse;font-size:12px}
.ilt th{padding:8px 9px;background:var(--s2);color:var(--t2);font-weight:600;text-align:right;position:sticky;top:0;white-space:nowrap;z-index:1;letter-spacing:.03em}
.ilt th:first-child{text-align:left}
.ilt td{padding:7px 9px;border-bottom:1px solid var(--bd);color:var(--tx);text-align:right;white-space:nowrap}
.ilt td:first-child{text-align:left;color:var(--t2)}
.ilt tr.tot td{font-weight:700;color:var(--a);border-top:1px solid var(--bd);border-bottom:none}
.decl{display:flex;gap:9px;align-items:flex-start;font-size:12px;color:var(--t2);line-height:1.55;cursor:pointer;margin:13px 0 3px}
.decl input{accent-color:var(--a);width:14px;height:14px;flex-shrink:0;margin-top:2px}

/* ── medical ── */
.mq{margin-bottom:13px}
.ml{font-size:12px;color:var(--t2);font-weight:500;margin-bottom:7px;display:block}
.rg{display:flex;gap:7px}
.rb{flex:1;padding:9px;text-align:center;background:var(--s2);border:1.5px solid var(--bd);border-radius:8px;font:12px 'Inter',ui-sans-serif,sans-serif;color:var(--t2);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.rb.on{border-color:var(--a);background:var(--aa);color:var(--ad)}
.bmir{display:flex;gap:8px}.bmir .fi{flex:1}
.bmib{background:var(--s2);border:1.5px solid var(--bd);border-radius:9px;padding:11px;font-size:13px;font-weight:600;color:var(--t2);display:flex;align-items:center;justify-content:center;min-width:70px;white-space:nowrap}

/* ── upload ── */
.upz{border:2px dashed var(--bd);border-radius:11px;padding:24px;text-align:center;cursor:pointer;transition:border-color .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.upz:hover,.upz.active{border-color:var(--a)}
.upz-ic{color:var(--t3);transition:color .2s}
.upz:hover .upz-ic{color:var(--a)}
.upt{font-size:13px;color:var(--t2)}
.ups{font-size:11px;color:var(--t3)}
#pprev{width:100%;border-radius:8px;margin-top:10px;display:none;max-height:160px;object-fit:cover}
.nck{margin-top:9px;padding:8px;border-radius:8px;font-size:12px;display:none;gap:7px;align-items:center}
.nck.ok{display:flex;background:rgba(11,175,136,.08);color:var(--ad);border:1px solid rgba(11,175,136,.3)}
.nck.fail{display:flex;background:rgba(220,53,69,.07);color:var(--red);border:1px solid rgba(220,53,69,.25)}

/* ── signature ── */
#sigc{width:100%;height:145px;display:block;background:var(--s2);border:1.5px solid var(--bd);border-radius:9px;cursor:crosshair;touch-action:none}
.sgh{text-align:center;font-size:11px;color:var(--t3);margin-top:5px}

/* ── payment ── */
.cnets{display:flex;gap:6px;margin-bottom:13px}
.cnet{padding:6px;border:1px solid var(--bd);border-radius:5px;font-size:10px;font-weight:700;color:var(--t3);display:flex;align-items:center;justify-content:center}
.phi{text-align:center;font-size:10px;color:var(--t3);margin-top:10px;display:flex;align-items:center;justify-content:center;gap:5px}
.pay2{display:flex;gap:9px}.pay2 .fi{flex:1}
.payamt{display:flex;justify-content:space-between;align-items:center;background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:13px;margin-bottom:12px}
.payamt-l{font-size:11px;color:var(--t2)}
.payamt-v{font-size:18px;font-weight:700;color:var(--a)}

/* ── confirmation ── */
.conf{text-align:center;padding:14px 0}
.cico{width:56px;height:56px;border-radius:50%;background:var(--aa);border:2px solid var(--a);display:grid;place-items:center;margin:0 auto 14px;color:var(--a)}
.cico svg{width:24px;height:24px}
.ch{font-size:17px;font-weight:700;margin-bottom:10px}
.cp{font-size:13px;color:var(--t2);line-height:1.7}
.ce{color:var(--a);font-weight:500}

/* ── animations ── */
@keyframes pop{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes bnc{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
</style>
</head>

<script>
// ═══════════════════════════════════════════════
// ICON LIBRARY — stroke-based, currentColor
// ═══════════════════════════════════════════════
const ic = {

  warn:     `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,

// CONSTANTS

const FUNDS = {
  aggressive:{ label:'Aggressive', rate:7.51, eq:70, db:30 },

  51:2.65,52:2.85,53:3.05,54:3.25,55:3.45,

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const S = {
  conv: [],
  u: { name:'', email:'', dob:'', gender:'male', income:0, smoker:false, plan:'' },
  q: { cover:0, term:20, premium:0, fund:'balanced' },

// ═══════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════
const G = id => document.getElementById(id);
const msgs = G('msgs'), inp = G('inp'), snd = G('snd'), typing = G('typing');

const fmt = n => '$' + Math.round(n).toLocaleString('en-US');
const delay = ms => new Promise(r => setTimeout(r, ms));

function getAge(dob) {
  const p = dob.split('/');
  if (p.length !== 3) return null;
  const [d,m,y] = p.map(Number);
  if (!d||!m||!y||y<1900) return null;
  const today = new Date();
  let age = today.getFullYear() - y;
  const md = today.getMonth()+1 - m;
  if (md < 0 || (md===0 && today.getDate() < d)) age--;
  return age;
}

// ═══════════════════════════════════════════════
// RATING ENGINE
// ═══════════════════════════════════════════════
function calcProtPremium(cover, age, term, smoker, gender) {
  const base = AGE_RATES[Math.round(age)] || 1.0;
  const tf = 0.78 + (term / 30) * 0.52;
  let annual = (cover / 1000) * base * tf;
  if (smoker) annual *= 1.35;
  if (gender === 'female') annual *= 0.85;
  return Math.max(5, Math.ceil(annual / 12));
}

function calcSavMaturity(premium, term) {
  const r = 0.01 / 12; let fv = 0;
  for (let i = 0; i < term * 12; i++) fv = (fv + premium) * (1 + r);
  return Math.round(fv);
}

function calcInvMaturity(premium, term, fundKey) {
  const r = FUNDS[fundKey].rate / 100 / 12; let fv = 0;
  for (let y = 1; y <= term; y++) {
    for (let m = 0; m < 12; m++) fv = (fv + premium) * (1 + r);
    fv *= 0.99;
  }
  return Math.round(fv);
}

function buildIllustration() {
  const { plan, dob, smoker, gender } = S.u;
  const { cover, term, premium, fund } = S.q;
  const age = getAge(dob); const rows = [];
  if (plan === 'protection') {
    const mp = calcProtPremium(cover, age, term, smoker, gender); let totalPaid = 0;
    for (let y = 1; y <= term; y++) { totalPaid += mp*12; rows.push({y,age:age+y,paid:totalPaid,cover,mat:null}); }
  } else if (plan === 'savings') {
    const r = 0.01/12; let fv=0, totalPaid=0;
    for (let y=1;y<=term;y++){for(let m=0;m<12;m++){fv=(fv+premium)*(1+r);totalPaid+=premium;}rows.push({y,age:age+y,paid:totalPaid,cover:Math.min(120*premium,1e6),mat:Math.round(fv)});}
  } else if (plan === 'investment') {
    const r = FUNDS[fund].rate/100/12; let fv=0, totalPaid=0;
    for (let y=1;y<=term;y++){for(let m=0;m<12;m++){fv=(fv+premium)*(1+r);totalPaid+=premium;}fv*=0.99;rows.push({y,age:age+y,paid:totalPaid,cover:Math.min(120*premium,1e6),mat:Math.round(fv)});}
  }
  return rows;
}

// ═══════════════════════════════════════════════
// API LAYER
// ═══════════════════════════════════════════════
async function callAPI(userMsg) {
  S.conv.push({ role:'user', content: userMsg });
  showTyping(true);
  try {
    const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ messages:S.conv, systemPrompt:buildSysPrompt() }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'API error');
    const text = data.content?.[0]?.text || '';
    S.conv.push({ role:'assistant', content: text });
    return parseResp(text);
  } catch(e) {
    S.conv.pop();
    return { message:"I'm having a little trouble right now — please try again in a moment", action:{type:'none'} };
  } finally { showTyping(false); }
}

async function callAPIWithImage(userMsg, imgData) {
  S.conv.push({ role:'user', content: userMsg });
  showTyping(true);
  try {
    const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ messages:S.conv, systemPrompt:buildSysPrompt()+'\n\nIMPORTANT: A passport image has been uploaded. Extract the full name and compare with the application name. Respond in the standard JSON format', imageData:imgData }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    const text = data.content?.[0]?.text || '';
    S.conv.push({ role:'assistant', content: text });
    return parseResp(text);
  } catch(e) {
    S.conv.pop();
    return { message:"There was an issue verifying your document — please try uploading again", action:{type:'none'} };
  } finally { showTyping(false); }
}

function parseResp(text) {
  try { return JSON.parse(text); }
  catch { const m=text.match(/\{[\s\S]*\}/); if(m) try{return JSON.parse(m[0]);}catch{} return {message:text,action:{type:'none'}}; }
}

// ═══════════════════════════════════════════════
// FLOW ENGINE
// ═══════════════════════════════════════════════
async function executeAction(action) {
  if (!action || action.type === 'none') return;
  await delay(360);
  switch (action.type) {
    case 'show_plan_selector':    renderPlans(); break;
    case 'show_info_form':        renderInfoForm(); break;
    case 'show_protection_quote': renderProtQuote(); break;
    case 'show_savings_quote':    renderSavQuote(); break;
    case 'show_investment_quote': renderInvQuote(); break;
    case 'show_illustration':     renderIllustration(); break;
    case 'show_medical':          renderMedical(); break;
    case 'show_upload':           renderUpload(); break;
    case 'show_signature':        renderSignature(); break;
    case 'show_payment':          renderPayment(); break;
    case 'show_confirmation':     renderConfirmation(); break;
  }
}

async function sendUserMsg() {
  const text = inp.value.trim(); if (!text || S.busy) return;
  S.busy = true; setActive(false); addUser(text); inp.value = ''; resizeInp();
  const resp = await callAPI(text); addBot(resp.message); await executeAction(resp.action);
  S.busy = false; setActive(true);
}

async function sendAction(displayMsg, apiMsg) {
  if (S.busy) return; S.busy = true; setActive(false); addUser(displayMsg);
  const resp = await callAPI(apiMsg || displayMsg); addBot(resp.message); await executeAction(resp.action);
  S.busy = false; setActive(true);
}

function resizeInp() { inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,90)+'px'; }

  const dobOk=validDOB(G('f_dob').value);

function validDOB(val) {
  if(val.length!==10)return false;
  const age=getAge(val);
  return age!==null&&age>=18&&age<=70;
}

async function submitInfo() {
  const name=G('f_name').value.trim(), email=G('f_email').value.trim(), dob=G('f_dob').value.trim(), inc=Number(G('f_inc').value);

  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){G('f_email').classList.add('err');err=true;}else G('f_email').classList.remove('err');
  if(!validDOB(dob)){G('f_dob').classList.add('err');err=true;}else G('f_dob').classList.remove('err');
  if(!inc){G('f_inc').classList.add('err');err=true;}else G('f_inc').classList.remove('err');

  S.u={...S.u,name,email,dob,income:inc};

  else{S.q.premium=Math.max(100,Math.min(10000,Math.round(inc*0.1)));S.q.term=10;}
  lockCard('info_card'); S.stage='info_collected'; S.busy=true; setActive(false);

    <div class="card" id="inv_card">
      <div class="ctag">${ic.trending} Investment plan</div>
      <div class="slr">

        <input type="range" id="iv_psl" min="100" max="10000" step="50" value="${prem}" oninput="upInvQ()">

      <div class="slr">
        <div class="slh"><span class="sll">Policy term</span><span class="slv" id="iv_tv">${term} years</span></div>
        <input type="range" id="iv_tsl" min="5" max="30" step="1" value="${term}" oninput="upInvQ()">

        <div class="fnd sel" onclick="pickFund('balanced',this)"><div class="fn">BALANCED</div><div class="fr">5.98%</div><div class="fs">50% Eq / 50% Debt</div></div>

      <div class="qrow">
        <div><div class="ql">Life cover</div><div class="qv" id="iv_cv">${fmt(cover)}</div></div>
        <div style="text-align:right"><div class="ql">Projected maturity</div><div class="qv" id="iv_mv">${fmt(mat)}</div><div class="qs" id="iv_ms">after ${term} yrs · Balanced</div></div>
      </div>

      <div class="qdiv"></div>
      <div class="feat" style="margin-bottom:10px">${ic.check} We continue paying your premiums for the entirety of the policy term in case you are diagnosed with a terminal illness, become disabled, or in the event of your death (we didn't want to mention this, but such is the nature of this conversation)</div>
      <div class="warn">${ic.warn} Past returns are not indicative of future gains — please invest as per your risk appetite</div>
      <button class="btn" onclick="acceptInvQ()">This looks good, proceed ${ic.arrow}</button>
    </div>
    <button class="edit-link" id="inv_card_edit" style="display:none" onclick="editCard('inv_card','info_collected')">${ic.edit} Adjust quote</button>`);
}

function pickFund(key, el) {
  document.querySelectorAll('#fund_opts .fnd').forEach(f=>f.classList.remove('sel'));
  el.classList.add('sel'); S.q.fund=key; upInvQ();
}

function upInvQ() {
  const prem=Number(G('iv_psl').value), term=Number(G('iv_tsl').value);
  S.q.premium=prem; S.q.term=term; const cover=Math.min(120*prem,1e6), mat=calcInvMaturity(prem,term,S.q.fund);
  G('iv_pv').textContent=fmt(prem); G('iv_tv').textContent=term+' years';
  G('iv_cv').textContent=fmt(cover); G('iv_mv').textContent=fmt(mat);
  G('iv_ms').textContent=`after ${term} yrs · ${FUNDS[S.q.fund].label}`; G('iv_tp').textContent=fmt(prem*term*12);
}

async function acceptInvQ() {
  const {premium,term,fund}=S.q, mat=calcInvMaturity(premium,term,fund);
  lockCard('inv_card'); S.stage='quote_accepted'; S.busy=true; setActive(false);
  addUser(`Investment plan confirmed — ${fmt(premium)}/month, ${term} yrs, ${FUNDS[fund].label} Fund`);
  const resp=await callAPI(`I've accepted the investment plan — premium: ${fmt(premium)}/month, term: ${term} years, fund: ${FUNDS[fund].label} (${FUNDS[fund].rate}%), projected maturity: ${fmt(mat)} — please show the illustration`);
  addBot(resp.message); await executeAction(resp.action); S.busy=false; setActive(true);
}

  const last=rows[rows.length-1];
  const totRow=`<tr class="tot"><td>Total</td><td>—</td><td>${fmt(last.paid)}</td><td>${fmt(last.cover)}</td>${isP?'':`<td>${fmt(last.mat)}</td>`}</tr>`;

// COMPONENT: MEDICAL QUESTIONNAIRE
// ═══════════════════════════════════════════════
function renderMedical() {
  if(G('med_card'))return;

    <div class="card" id="med_card">
      <div class="ctag">Medical questionnaire</div>
      <div class="mq">
        <div class="bmir">
          <input class="fi" id="m_h" type="number" placeholder="Height (cm)" min="100" max="250" oninput="calcBMI()">
          <input class="fi" id="m_w" type="number" placeholder="Weight (kg)" min="20" max="300" oninput="calcBMI()">
          <div class="bmib" id="bmi_box">BMI</div>
        </div>
      </div>
      <div class="mq"><span class="ml">Alcohol consumption</span>
        <div class="rg">
          <button class="rb on" onclick="setRb('alc','none',this)">None</button>
          <button class="rb"    onclick="setRb('alc','occasional',this)">Occasional</button>
          <button class="rb"    onclick="setRb('alc','regular',this)">Regular</button>
        </div>
      </div>
      <div class="mq"><span class="ml">Chronic condition — diabetes, hypertension, blood pressure, or similar?</span>
        <div class="rg"><button class="rb on" onclick="setRb('cc','no',this)">No</button><button class="rb" onclick="setRb('cc','yes',this)">Yes</button></div>
      </div>
      <div class="mq"><span class="ml">Hospitalised or had major surgery in the last 5 years?</span>
        <div class="rg"><button class="rb on" onclick="setRb('hosp','no',this)">No</button><button class="rb" onclick="setRb('hosp','yes',this)">Yes</button></div>
      </div>
      <div class="mq"><span class="ml">Taking any regular medication?</span>
        <div class="rg"><button class="rb on" onclick="setRb('medic','no',this)">No</button><button class="rb" onclick="setRb('medic','yes',this)">Yes</button></div>
      </div>
      <div class="mq"><span class="ml">Family history of cancer, heart disease, or stroke?</span>
        <div class="rg"><button class="rb on" onclick="setRb('fhist','no',this)">No</button><button class="rb" onclick="setRb('fhist','yes',this)">Yes</button></div>
      </div>
      <div class="mq"><span class="ml">Hazardous activities — diving, motorsport, or similar?</span>
        <div class="rg"><button class="rb on" onclick="setRb('haz','no',this)">No</button><button class="rb" onclick="setRb('haz','yes',this)">Yes</button></div>
      </div>
      <div class="disc" style="margin-bottom:4px">${ic.info} Honest answers ensure seamless claims</div>
      <button class="btn" onclick="submitMed()">Submit medical information ${ic.arrow}</button>
    </div>
    <button class="edit-link" id="med_card_edit" style="display:none" onclick="editCard('med_card','illustration_agreed')">${ic.edit} Edit medical information</button>`);
}

function calcBMI() {
  const h=Number(G('m_h').value), w=Number(G('m_w').value);
  if(h>0&&w>0){const bmi=(w/Math.pow(h/100,2)).toFixed(1);const box=G('bmi_box');box.textContent='BMI '+bmi;box.style.color=(bmi<18.5||bmi>30)?'var(--gold)':'var(--a)';}
}

function setRb(key, val, btn) {
  btn.parentElement.querySelectorAll('.rb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); S.medVals[key]=val;
}

async function submitMed() {
  const h=G('m_h').value||'—', w=G('m_w').value||'—', mv=S.medVals;
  lockCard('med_card'); S.stage='medical_done'; S.busy=true; setActive(false);
  addUser('Medical information submitted');
  const summary=`Height:${h}cm, Weight:${w}kg, Alcohol:${mv.alc}, Chronic conditions:${mv.cc}, Hospitalised:${mv.hosp}, Medication:${mv.medic}, Family history:${mv.fhist}, Hazardous activities:${mv.haz}`;
  const resp=await callAPI(`Medical questionnaire complete — ${summary} — please proceed to document upload`);
  addBot(resp.message); await executeAction(resp.action); S.busy=false; setActive(true);
}

// ═══════════════════════════════════════════════
// COMPONENT: DOCUMENT UPLOAD
// ═══════════════════════════════════════════════
function renderUpload() {
  if(G('up_card'))return;
  addComp(`
    <div class="card" id="up_card">
      <div class="ctag">Identity verification</div>
      <div class="upz" id="upz" onclick="G('pp_inp').click()">
        <span class="upz-ic">${ic.passport}</span>
        <div class="upt">Upload your passport</div>
        <div class="ups">Tap to select — JPG, PNG or PDF</div>
      </div>
      <input type="file" id="pp_inp" accept="image/*,application/pdf" style="display:none" onchange="handlePassport(this)">
      <img id="pprev" alt="Passport preview">
      <div id="pdf_tag" style="display:none;margin-top:10px;padding:10px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;font-size:12px;color:var(--t2);align-items:center;gap:7px"></div>
      <div class="nck" id="nck"></div>
      <button class="btn" id="up_btn" style="display:none" onclick="confirmPassport()">Confirmed, proceed ${ic.arrow}</button>
    </div>
    <button class="edit-link" id="up_card_edit" style="display:none" onclick="editCard('up_card','medical_done')">${ic.edit} Re-upload document</button>`);
}

async function handlePassport(input) {
  const file=input.files[0]; if(!file)return;
  G('upz').classList.add('active');
  const isPDF=file.type==='application/pdf';
  const reader=new FileReader();
  reader.onload=async e=>{
    const b64=e.target.result.split(',')[1], mtype=file.type||'image/jpeg';
    if(isPDF){
      G('pprev').style.display='none';
      const pt=G('pdf_tag'); pt.innerHTML=`${ic.doc} ${file.name}`; pt.style.display='flex';
    } else {
      G('pprev').src=e.target.result; G('pprev').style.display='block';
    }
    S.busy=true; setActive(false);
    const checkMsg=`The user has uploaded their passport — please extract the name from the passport (from the MRZ or data page) and check if it matches the application name "${S.u.name}" — state whether they match or not, and be specific`;
    const resp=await callAPIWithImage(checkMsg,{base64:b64,mediaType:mtype});
    addBot(resp.message);
    const isMatch=/match|correct|verified|same|confirm/i.test(resp.message)&&!/not match|mismatch|differ|incorrect/i.test(resp.message);
    const nck=G('nck');
    if(isMatch){
      nck.className='nck ok'; nck.innerHTML=`${ic.check} Name verified — ${S.u.name}`; nck.style.display='flex';
      S.nameMatched=true; G('up_btn').style.display='flex';
    } else {
      nck.className='nck fail'; nck.innerHTML='Name mismatch — please check and re-upload'; nck.style.display='flex';
    }
    S.busy=false; setActive(true);
  };
  reader.readAsDataURL(file);
}

async function confirmPassport() {
  lockCard('up_card'); S.stage='doc_uploaded';
  await sendAction('Passport verified', "My passport has been verified successfully — please proceed to the digital signature");
}

// ═══════════════════════════════════════════════
// COMPONENT: DIGITAL SIGNATURE
// ═══════════════════════════════════════════════
function renderSignature() {
  if(G('sig_card'))return;
  addComp(`
    <div class="card" id="sig_card">
      <div class="ctag">Digital signature</div>
      <p style="font-size:12px;color:var(--t2);margin-bottom:12px;line-height:1.6">By signing below, you confirm that all information provided in this application is accurate and complete to the best of your knowledge</p>
      <canvas id="sigc"></canvas>
      <div class="sgh">Draw your signature above</div>
      <button class="gbtn" onclick="clearSig()">Clear</button>
      <button class="btn" onclick="submitSig()">Submit signature ${ic.arrow}</button>
    </div>
    <button class="edit-link" id="sig_card_edit" style="display:none" onclick="editCard('sig_card','doc_uploaded')">${ic.edit} Re-sign</button>`);
  initSigPad();
}

function initSigPad() {
  const canvas=G('sigc'), ctx=canvas.getContext('2d'), dpr=window.devicePixelRatio||1, w=canvas.offsetWidth||400;
  canvas.width=w*dpr; canvas.height=145*dpr; ctx.scale(dpr,dpr);
  ctx.strokeStyle='#0BAF88'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.lineJoin='round';
  let drawing=false;
  function pos(e){const r=canvas.getBoundingClientRect(),src=e.touches?e.touches[0]:e;return{x:(src.clientX-r.left)*(canvas.width/dpr/r.width),y:(src.clientY-r.top)*(canvas.height/dpr/r.height)};}
  function start(e){e.preventDefault();drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}
  function move(e){if(!drawing)return;e.preventDefault();const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();}
  function end(){drawing=false;}
  canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);canvas.addEventListener('mouseup',end);canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',end);
  window._sigCtx=ctx;window._sigCanvas=canvas;
}

function clearSig(){const c=window._sigCanvas;if(c)window._sigCtx.clearRect(0,0,c.width,c.height);}

async function submitSig() {
  const c=window._sigCanvas; if(!c)return;
  const data=c.getContext('2d').getImageData(0,0,c.width,c.height).data;
  if(!Array.from(data).some((v,i)=>i%4===3&&v>0)){addBot("Please draw your signature on the canvas before proceeding");return;}
  S.sigData=c.toDataURL(); lockCard('sig_card'); S.stage='signed';
  await sendAction('Signature submitted',"I've provided my digital signature — please proceed to payment");
}

// ═══════════════════════════════════════════════
// COMPONENT: PAYMENT
// ═══════════════════════════════════════════════
function renderPayment() {
  if(G('pay_card'))return;
  let amount=S.q.premium;
  if(S.u.plan==='protection')amount=calcProtPremium(S.q.cover,getAge(S.u.dob),S.q.term,S.u.smoker,S.u.gender);
  addComp(`
    <div class="card" id="pay_card">
      <div class="ctag">${ic.card} First premium payment</div>
      <div class="cnets"><div class="cnet">VISA</div><div class="cnet">MC</div><div class="cnet">AMEX</div></div>
      <div class="payamt"><span class="payamt-l">First month premium</span><span class="payamt-v">${fmt(amount)}</span></div>
      <div class="flds">
        <input class="fi" id="py_name" type="text" placeholder="Name on card">
        <input class="fi" id="py_card" type="tel"  placeholder="Card number" maxlength="19" oninput="fmtCard(this)">
        <div class="pay2">
          <input class="fi" id="py_exp" type="tel" placeholder="MM / YY" maxlength="7" oninput="fmtExp(this)">
          <input class="fi" id="py_cvv" type="tel" placeholder="CVV" maxlength="4" style="flex:0 0 80px">
        </div>
      </div>
      <div class="phi">${ic.lock} Secure payment &nbsp;·&nbsp; Test mode: any valid card format accepted</div>
      <button class="btn" id="pay_btn" onclick="submitPay('${fmt(amount)}')">Pay ${fmt(amount)} ${ic.arrow}</button>
    </div>`);
}

function fmtCard(el){let v=el.value.replace(/\D/g,'').slice(0,16);el.value=v.match(/.{1,4}/g)?.join(' ')||v;}
function fmtExp(el){let v=el.value.replace(/\D/g,'');if(v.length>2)v=v.slice(0,2)+' / '+v.slice(2,4);el.value=v;}

async function submitPay(fmtAmt) {
  const nm=G('py_name').value.trim(), cd=G('py_card').value.replace(/\s/g,''), ex=G('py_exp').value.replace(/[\s\/]/g,''), cv=G('py_cvv').value.trim();
  let err=false;
  if(!nm){G('py_name').classList.add('err');err=true;}else G('py_name').classList.remove('err');
  if(cd.length<13){G('py_card').classList.add('err');err=true;}else G('py_card').classList.remove('err');
  if(ex.length<3){G('py_exp').classList.add('err');err=true;}else G('py_exp').classList.remove('err');
  if(cv.length<3){G('py_cvv').classList.add('err');err=true;}else G('py_cvv').classList.remove('err');
  if(err)return;
  const btn=G('pay_btn'); btn.disabled=true; btn.textContent='Processing…';
  await delay(1800);
  G('pay_card').classList.add('done'); S.stage='paid'; S.busy=true; setActive(false);
  addUser(`Payment of ${fmtAmt} processed`);
  const resp=await callAPI(`Payment was successful — please show the confirmation screen now`);
  addBot(resp.message); await executeAction(resp.action); S.busy=false; setActive(true);
}
