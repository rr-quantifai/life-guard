<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Life Guard I Life insurance advisory</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F7FB;--s1:#FFFFFF;--s2:#EDF0F8;--s4:#CDD3E8;
  --a:#0BAF88;--ad:#089070;--aa:rgba(11,175,136,.10);
  --tx:#1C2237;--t2:#4A5272;--t3:#98A3C0;
  --red:#DC3545;--gold:#9A6400;
  --bb:#FFFFFF;--bd:#D5DAF0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{height:100%;background:var(--bg);color:var(--tx);font-family:'Inter',ui-sans-serif,sans-serif;font-size:14px;line-height:1.5;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;max-width:600px;margin:0 auto}
#msgs{flex:1;overflow-y:auto;padding:10px 14px 0;display:flex;flex-direction:column;gap:5px}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}
.row{display:flex;align-items:flex-end;gap:8px;animation:pop .22s ease}
.row.u{justify-content:flex-end}
.av{width:28px;height:28px;border-radius:50%;background:var(--aa);border:1.5px solid var(--a);display:grid;place-items:center;flex-shrink:0;color:var(--a)}
.av svg{width:13px;height:13px}
.bbl{max-width:80%;padding:12px;border-radius:14px;font-size:14px;line-height:1.6}
.row:not(.u) .bbl{background:var(--bb);border:1px solid var(--bd);border-bottom-left-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.row.u .bbl{background:var(--a);color:#fff;font-weight:500;border-bottom-right-radius:3px}
.comp{margin-left:36px;margin-bottom:5px;animation:pop .22s ease;position:relative}
#typing{display:none;align-items:flex-end;gap:8px;padding:0 14px 6px}
.tdots{background:var(--bb);border:1px solid var(--bd);border-radius:14px;border-bottom-left-radius:3px;padding:10px;display:flex;gap:5px;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.tdot{width:6px;height:6px;background:var(--s4);border-radius:50%;animation:bnc 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}

/* ── Panel (sits between msgs and bar) ── */
#panel{background:var(--s1);border-top:1px solid var(--bd);overflow-y:auto;max-height:55vh;display:none}
#panel::-webkit-scrollbar{width:3px}
#panel::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}
.chips{display:flex;flex-wrap:wrap;gap:8px;padding:12px 14px}
.chip{padding:9px 15px;background:var(--s2);border:1.5px solid var(--bd);border-radius:20px;font:500 13px/1 'Inter',ui-sans-serif,sans-serif;color:var(--t2);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
.chip:hover,.chip.sel{border-color:var(--a);color:var(--ad);background:var(--aa)}
.pnl{padding:14px 14px 4px}
.pnl-hd{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.pnl-row{margin-bottom:10px}
.pnl-sub{width:100%;padding:12px;background:var(--a);color:#fff;border:none;border-radius:11px;font:700 13px 'Inter',ui-sans-serif,sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .2s;margin-bottom:10px}
.pnl-sub:hover{background:var(--ad)}
.pnl-sub:disabled{background:var(--s4);color:var(--t3);cursor:default}

#bar{padding:10px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:var(--bg)}
#attach-preview{display:none;align-items:center;gap:8px;margin-bottom:6px}
.attach-chip{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:7px;flex:1;min-width:0}
#attach-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;color:var(--t2)}
#attach-clear{background:none;border:none;cursor:pointer;color:var(--t3);display:flex;align-items:center;justify-content:center;padding:4px;border-radius:50%;transition:color .2s;flex-shrink:0}
#attach-clear:hover{color:var(--red)}
#bri{display:flex;align-items:center;gap:8px;background:var(--s1);border:1.5px solid var(--bd);border-radius:22px;padding:10px;transition:border-color .2s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
#bri:focus-within{border-color:var(--a)}
#attach-btn{width:28px;height:28px;border-radius:50%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:color .2s;flex-shrink:0}
#attach-btn:hover,#attach-btn.active{color:var(--a)}
#inp{flex:1;background:none;border:none;outline:none;color:var(--tx);font:inherit;resize:none;max-height:90px;min-height:20px;line-height:1.4}
#inp::placeholder{color:var(--t3)}
#snd{width:32px;height:32px;border-radius:50%;background:var(--a);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .1s;color:#fff}
#snd:hover{background:var(--ad)}#snd:active{transform:scale(.94)}
#snd:disabled{background:var(--s4);cursor:default}
#snd svg{width:14px;height:14px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:17px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card.done{opacity:.35;cursor:pointer;user-select:none;touch-action:manipulation}
.card.done *{pointer-events:none}
.card-overlay{position:absolute;inset:0;border-radius:14px;display:flex;align-items:center;justify-content:center;background:rgba(245,247,251,.88);pointer-events:none}
.card-overlay-pill{display:flex;align-items:center;gap:7px;background:#fff;border:1.5px solid #D5DAF0;border-radius:20px;padding:9px 16px}
.card-overlay-txt{font-size:12px;font-weight:600;color:#1C2237}
.ctag{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ad);margin-bottom:13px;display:flex;align-items:center;gap:6px}
.flds{display:flex;flex-direction:column;gap:9px}
.fi{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:9px;padding:11px;color:var(--tx);font:inherit;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.fi:focus{border-color:var(--a)}.fi.err{border-color:var(--red)}
.fi::placeholder{color:var(--t3)}
.pfxw{position:relative}
.pfx{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t2);pointer-events:none;font-size:13px}
.fi.pl{padding-left:44px}
.tgr{display:flex;align-items:center;justify-content:space-between;gap:8px}
.tgl{font-size:12px;color:var(--t2);flex-shrink:0}
.tg{display:flex;background:var(--s2);border:1.5px solid var(--bd);border-radius:8px;overflow:hidden}
.tb{flex:1;padding:9px;border:none;background:none;color:var(--t2);font:12px/1 'Inter',ui-sans-serif,sans-serif;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;justify-content:center}
.tb.on{background:var(--a);color:#fff}
.slr{margin:14px 0}
.slh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.sll{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.slv{font-size:19px;font-weight:700;color:var(--tx)}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:var(--s4);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--a);cursor:pointer;box-shadow:0 0 0 4px var(--aa)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--a);border:none;cursor:pointer}
.sllm{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-top:3px}
.qdiv{height:1px;background:var(--bd);margin:13px 0}
.qrow{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:9px}
.ql{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;font-weight:600}
.qv{font-size:17px;font-weight:700;color:var(--tx)}
.qs{font-size:10px;color:var(--t3);margin-top:1px}
.feat{background:var(--aa);border:1px solid rgba(11,175,136,.25);border-radius:9px;padding:11px;display:flex;gap:9px;align-items:flex-start;font-size:11px;color:var(--ad);line-height:1.6}
.feat svg{width:14px;height:14px;flex-shrink:0;margin-top:2px}
.fnds{display:flex;gap:7px;margin:9px 0}
.fnd{flex:1;padding:9px;background:var(--s2);border:1.5px solid var(--bd);border-radius:9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s}
.fnd.sel{border-color:var(--a);background:var(--aa)}
.fn{font-size:9px;font-weight:700;color:var(--t2);letter-spacing:.06em;margin-bottom:2px}
.fr{font-size:14px;font-weight:700;color:var(--a)}
.fs{font-size:9px;color:var(--t3);margin-top:1px}
.warn{background:rgba(154,100,0,.07);border:1px solid rgba(154,100,0,.22);border-radius:9px;padding:10px;display:flex;gap:8px;font-size:11px;color:var(--gold);line-height:1.6;align-items:flex-start}
.warn svg{width:14px;height:14px;flex-shrink:0;margin-top:2px}
.btn{width:100%;padding:13px;background:var(--a);color:#fff;border:none;border-radius:11px;font:700 14px 'Inter',ui-sans-serif,sans-serif;cursor:pointer;margin-top:13px;transition:background .2s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{background:var(--ad)}.btn:active{transform:scale(.99)}
.btn:disabled{background:var(--s4);color:var(--t3);cursor:default;transform:none}
.btn svg{flex-shrink:0}
.gbtn{width:100%;padding:10px;background:none;border:1.5px solid var(--bd);border-radius:9px;color:var(--t2);font:13px 'Inter',ui-sans-serif,sans-serif;cursor:pointer;margin-top:8px;transition:border-color .2s,color .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.gbtn:hover{border-color:var(--a);color:var(--a)}
.ilw{overflow:auto;border-radius:8px;max-height:230px}
.ilt{width:100%;border-collapse:collapse;font-size:12px}
.ilt th{padding:8px 9px;background:var(--s2);color:var(--t2);font-weight:600;text-align:right;position:sticky;top:0;white-space:nowrap;z-index:1;letter-spacing:.03em}
.ilt th:first-child{text-align:left}
.ilt td{padding:7px 9px;border-bottom:1px solid var(--bd);color:var(--tx);text-align:right;white-space:nowrap}
.ilt td:first-child{text-align:left;color:var(--t2)}
.ilt tr.tot td{font-weight:700;color:var(--a);border-top:1px solid var(--bd);border-bottom:none}
.decl{display:flex;gap:9px;align-items:flex-start;font-size:12px;color:var(--t2);line-height:1.55;cursor:pointer;margin:13px 0 3px}
.decl input{accent-color:var(--a);width:14px;height:14px;flex-shrink:0;margin-top:2px}
.ml{font-size:12px;color:var(--t2);font-weight:500;margin-bottom:7px;display:block}
.rg{display:flex;gap:7px}
.rb{flex:1;padding:9px;text-align:center;background:var(--s2);border:1.5px solid var(--bd);border-radius:8px;font:12px 'Inter',ui-sans-serif,sans-serif;color:var(--t2);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.rb.on{border-color:var(--a);background:var(--aa);color:var(--ad)}
.bmir{display:flex;gap:8px}.bmir .fi{flex:1}
.bmib{background:var(--s2);border:1.5px solid var(--bd);border-radius:9px;padding:11px;font-size:13px;font-weight:600;color:var(--t2);display:flex;align-items:center;justify-content:center;min-width:70px;white-space:nowrap}
#sigc{width:100%;height:145px;display:block;background:var(--s2);border:1.5px solid var(--bd);border-radius:9px;cursor:crosshair;touch-action:none}
.sgh{text-align:center;font-size:11px;color:var(--t3);margin-top:5px}
.cnets{display:flex;gap:6px;margin-bottom:13px}
.cnet{padding:4px;border:1px solid var(--bd);border-radius:5px;font-size:10px;font-weight:700;color:var(--t3);display:flex;align-items:center;justify-content:center}
.phi{text-align:center;font-size:10px;color:var(--t3);margin-top:10px;display:flex;align-items:center;justify-content:center;gap:5px}
.pay2{display:flex;gap:9px}.pay2 .fi{flex:1}
.payamt{display:flex;justify-content:space-between;align-items:center;background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:12px;margin-bottom:12px}
.payamt-l{font-size:11px;color:var(--t2)}
.payamt-v{font-size:18px;font-weight:700;color:var(--a)}
.nom-row{padding-bottom:13px;margin-bottom:13px;border-bottom:1px solid var(--bd)}
.nom-row:last-child{border-bottom:none;padding-bottom:0;margin-bottom:0}
.nom-spl{display:flex;gap:9px;margin-top:9px;align-items:center}
.nom-del{background:none;border:1.5px solid var(--bd);border-radius:9px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);font-size:18px;transition:all .2s;flex-shrink:0}
.nom-del:hover{border-color:var(--red);color:var(--red)}
.nom-pct{position:relative;flex:0 0 78px}
.nom-pct .fi{padding-right:22px;text-align:right}
.nom-pct-sym{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--t2);font-size:12px;pointer-events:none;font-weight:500}
.nom-spl select.fi{-webkit-appearance:auto;appearance:auto}
.nom-bar{height:4px;background:var(--s4);border-radius:2px;margin:13px 0 8px;overflow:hidden}
.nom-bar-fill{height:100%;border-radius:2px;background:var(--a);transition:width .35s,background .2s}
.nom-stats{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:4px}
.nom-stat-l{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:3px}
.nom-stat-v{font-size:17px;font-weight:700}
@keyframes pop{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes bnc{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
</style>
</head>
<body>
<div id="app">
  <div id="msgs"></div>
  <div id="typing">
    <div class="av"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>

<script>
const ic = {

  warn:     `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,

};

const API = '/.netlify/functions/chat';
const FUNDS = {
  aggressive:{ label:'Aggressive', rate:7.51 },
  balanced:  { label:'Balanced',   rate:5.98 },
  passive:   { label:'Passive',    rate:4.96 }
};
const AGE_RATES = {
  18:0.35,19:0.36,20:0.37,21:0.38,22:0.39,23:0.40,24:0.41,25:0.42,
  26:0.46,27:0.48,28:0.50,29:0.52,30:0.54,31:0.60,32:0.63,33:0.66,34:0.69,35:0.72,
  36:0.80,37:0.85,38:0.90,39:0.95,40:1.00,41:1.15,42:1.25,43:1.35,44:1.45,45:1.55,
  46:1.75,47:1.90,48:2.05,49:2.20,50:2.35,51:2.65,52:2.85,53:3.05,54:3.25,55:3.45,
  56:3.80,57:4.10,58:4.40,59:4.70,60:5.00,61:5.50,62:6.00,63:6.50,64:7.00,65:7.50,
  66:8.50,67:9.50,68:10.50,69:11.50,70:12.50
};

const S = {
  conv:[], u:{name:'',email:'',dob:'',gender:'male',income:0,smoker:false,plan:''},
  q:{cover:0,term:20,premium:0,fund:'balanced'}, stage:'start', busy:false,
  medVals:{alc:'none',cc:'no',hosp:'no',medic:'no',fhist:'no',haz:'no',height:0,weight:0},
  activeCard:null, nameMatched:false, nominees:[]
};
let _attachFile = null;

const msgs=G('msgs'),inp=G('inp'),snd=G('snd');

const fmt = n => '$'+Math.round(n).toLocaleString('en-US');
const delay = ms => new Promise(r=>setTimeout(r,ms));

function getAge(dob){
  const p=dob.split('/'); if(p.length!==3)return null;
  const [d,m,y]=p.map(Number); if(!d||!m||!y||y<1900)return null;
  const today=new Date(); let age=today.getFullYear()-y;
  const md=today.getMonth()+1-m;
  if(md<0||(md===0&&today.getDate()<d))age--;
  return age;
}

function calcProtPremium(cover,age,term,smoker,gender){
  const base=AGE_RATES[Math.round(age)]||1.0, tf=0.78+(term/30)*0.52;
  let annual=(cover/1000)*base*tf;
  if(smoker)annual*=1.35; if(gender==='female')annual*=0.85;
  return Math.max(5,Math.ceil(annual/12));
}
function calcSavMaturity(premium,term){
  const r=0.01/12; let fv=0;
  for(let i=0;i<term*12;i++)fv=(fv+premium)*(1+r);
  return Math.round(fv);
}
function calcInvMaturity(premium,term,fundKey){
  const r=FUNDS[fundKey].rate/100/12; let fv=0;
  for(let y=1;y<=term;y++){for(let m=0;m<12;m++)fv=(fv+premium)*(1+r);fv*=0.99;}
  return Math.round(fv);
}
function calcSurrenderValue(mat,year,term){
  return Math.round(mat*(1-Math.pow(1-year/term,2)));
}

function buildIllustration(){
  const {plan,dob,smoker,gender}=S.u,{cover,term,premium,fund}=S.q,age=getAge(dob),rows=[];
  if(plan==='protection'){
    const mp=calcProtPremium(cover,age,term,smoker,gender);let totalPaid=0;
    for(let y=1;y<=term;y++){totalPaid+=mp*12;rows.push({y,age:age+y,paid:totalPaid,cover,mat:null});}
  }else if(plan==='savings'){
    const r=0.01/12;let fv=0,totalPaid=0;
    for(let y=1;y<=term;y++){for(let m=0;m<12;m++){fv=(fv+premium)*(1+r);totalPaid+=premium;}rows.push({y,age:age+y,paid:totalPaid,cover:Math.min(120*premium,1e6),mat:Math.round(fv),sv:calcSurrenderValue(Math.round(fv),y,term)});}
  }else if(plan==='investment'){
    const r=FUNDS[fund].rate/100/12;let fv=0,totalPaid=0;
    for(let y=1;y<=term;y++){for(let m=0;m<12;m++){fv=(fv+premium)*(1+r);totalPaid+=premium;}fv*=0.99;rows.push({y,age:age+y,paid:totalPaid,cover:Math.min(120*premium,1e6),mat:Math.round(fv),sv:calcSurrenderValue(Math.round(fv),y,term)});}
  }
  return rows;
}

// ── Card locking + editing (DOM cards only: prot/sav/inv/ill/sig) ──
const STAGE_MAP={
  prot_card:'info_collected', sav_card:'info_collected', inv_card:'info_collected',
  ill_card:'quote_accepted', sig_card:'doc_uploaded',
  // panel-based — kept so editCard can route them correctly
  plan_card:'start', info_card:'plan_selected', med_card:'illustration_agreed'
};

function lockCard(id){
  const el=G(id); if(!el)return;
  el.classList.add('done');
  if(S.activeCard===id)S.activeCard=null;
  const comp=el.closest('.comp');
  if(!comp.querySelector('.card-overlay')){
    const ov=document.createElement('div');ov.className='card-overlay';
    ov.innerHTML=`<div class="card-overlay-pill"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#1C2237" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg><span class="card-overlay-txt">Double-click to edit</span></div>`;
    comp.appendChild(ov);
  }
  if(msgs.querySelector(`[data-sentinel="${id}"]`))return;
  const s=document.createElement('div');
  s.dataset.sentinel=id; s.dataset.convLen=S.conv.length; s.style.display='none';
  comp.after(s);
}

function editCard(id,resetStage,force=false){
  if(S.busy&&!force)return;
  if(id==='plan_card'){
    S.u={name:'',email:'',dob:'',gender:'male',income:0,smoker:false,plan:''};
    S.nameMatched=false;
    S.medVals={alc:'none',cc:'no',hosp:'no',medic:'no',fhist:'no',haz:'no',height:0,weight:0};
    S.nominees=[];
  }
  const sentinel=msgs.querySelector(`[data-sentinel="${id}"]`);
  if(sentinel){
    const cl=parseInt(sentinel.dataset.convLen);
    if(!isNaN(cl))S.conv=S.conv.slice(0,cl);
    while(sentinel.nextSibling)sentinel.nextSibling.remove();
    sentinel.remove();
  }
  const card=G(id);
  if(card){
    // DOM card (quotes, illustration, signature)
    card.classList.remove('done');
    const ov=card.closest('.comp')?.querySelector('.card-overlay');if(ov)ov.remove();
    if(id==='ill_card'){const chk=G('ill_chk');if(chk){chk.checked=false;G('ill_btn').disabled=true;}}
    if(id==='sig_card')clearSig();
    S.activeCard=id; S.stage=resetStage; S.busy=false; setActive(true);
    card.scrollIntoView({behavior:'smooth',block:'nearest'});
  }else{
    // Panel-based forms
    S.activeCard=id; S.stage=resetStage; S.busy=false; setActive(true);
    hidePanel();
    if(id==='plan_card') renderPlans();
    else if(id==='info_card'){renderInfoForm();setTimeout(()=>{if(S.u.name)prefillInfoCard(S.u);},50);}
    else if(id==='med_card') renderMedical();
  }
}

let _lastTapCard=null,_lastTapTime=0;
msgs.addEventListener('dblclick',e=>{
  const card=e.target.closest('.card.done');
  if(!card||!STAGE_MAP[card.id])return;
  editCard(card.id,STAGE_MAP[card.id]);
});
msgs.addEventListener('touchend',e=>{
  const card=e.target.closest('.card.done');
  if(!card||!STAGE_MAP[card.id])return;
  const now=Date.now();
  if(card===_lastTapCard&&now-_lastTapTime<300){e.preventDefault();editCard(card.id,STAGE_MAP[card.id]);_lastTapCard=null;_lastTapTime=0;}
  else{_lastTapCard=card;_lastTapTime=now;}
},{passive:false});

// ── System prompt ──
function buildSysPrompt(){
  const u=S.u,age=u.dob?getAge(u.dob):null;
  const mv=S.medVals;
  const medCtx=mv.height?`Height:${mv.height}cm, Weight:${mv.weight}kg, Alcohol:${mv.alc}, Chronic:${mv.cc}, Hospitalised:${mv.hosp}, Medication:${mv.medic}, Family history:${mv.fhist}, Hazardous:${mv.haz}`:'not yet collected';
  const ctx=u.name
    ?`CURRENT USER: Name="${u.name}", Email="${u.email}", Age=${age}, Gender=${u.gender}, Income=$${u.income}/mo, Smoker=${u.smoker?'Yes':'No'}, Selected plan="${u.plan||'none'}"\nMedical: ${medCtx}`
    :'User has not yet provided personal details';
  return `You are Life Guard, a warm and knowledgeable life insurance advisor. You help people understand, compare, and purchase life insurance through genuine conversation — not through forms or scripts

Think of yourself as an advisor who has a powerful set of tools. You reach for them when the conversation calls for it, not because a checklist says to. You can answer questions, explain jargon, analyse a policy document someone shares, compare a competitor's plan, summarise numbers for a family member, help someone think through how much cover they need — and when the moment is right, present a quote, run the illustration, or guide the purchase through to completion

${ctx}
Current journey stage: ${S.stage}
Active card awaiting confirmation: ${S.activeCard||'none'}
Passport verified: ${S.nameMatched}

ALWAYS respond ONLY in valid JSON — no extra text, no markdown:
{"message":"your conversational text","action":{"type":"ACTION_TYPE","data":{}}}

── YOUR TOOLS ──────────────────────────────────────────────────
Emit exactly one action per response. Choose the one that best serves the conversation.

none → conversational reply only

show_plan_selector → surface the 3 plan option chips; use when the user is actively deciding which type of cover they want

select_plan  data:{"plan":"protection"|"savings"|"investment"} → set the plan silently without chips; use when the user clearly names a preference in natural language

show_protection_quote  optional data:{"cover":0,"term":0}
show_savings_quote     optional data:{"premium":0,"term":0}
show_investment_quote  optional data:{"premium":0,"term":0,"fund":"aggressive|balanced|passive"}
→ show an interactive quote card; prerequisite: name, email, DOB (age 18–70, DD/MM/YYYY), and monthly income must all be known

show_illustration → show a year-by-year policy table; prerequisite: a quote has been accepted

show_medical → activate the medical collection stage AND ask for height and weight in the same message; prerequisite: illustration agreed

show_signature → show a signature canvas; prerequisites: medical complete AND passport verified

show_nominee → show the beneficiary panel; prerequisite: payment complete

prefill_info  data:{"name":"","email":"","dob":"DD/MM/YYYY","gender":"male|female","income":0,"smoker":false} → silently store personal fields learned from conversation or a document; include only known fields; emit incrementally as each value is confirmed

prefill_quote  data:{"cover":0,"term":0,"premium":0,"fund":"..."} → adjust the active quote card's values; include only changed fields

prefill_medical  data:{"height":0,"weight":0,"alc":"none|occasional|regular","cc":"yes|no","hosp":"yes|no","medic":"yes|no","fhist":"yes|no","haz":"yes|no"} → silently store medical fields; include only known fields; emit incrementally

prefill_nominee  data:[{"name":"","relationship":"Spouse|Child|Parent|Sibling|Other","share":0}] → pre-fill the nominee form; shares must total 100; only emit after show_nominee has rendered

confirm_active_card → programmatically submit the active card; never use for plan_card, nom_card, sig_card, or pay_card

passport_verified → emit when a shared ID confirms the name matches "${u.name}"

reset_to_plan_selection → re-show plan chips when the user wants to change plan but has not named one

── COLLECTING INFORMATION ──────────────────────────────────────
Collect all required information through conversation — never show a form. Check the context above before asking any question; never ask for something already captured.

Personal details (name, email, DOB, income):
Ask naturally, one or two fields at a time — start with name. When asking for income, always specify that you need the monthly amount in USD. Emit prefill_info as each value is confirmed. Once all 4 required fields are present, emit confirm_active_card immediately — do not wait for the user to say "done". If the user gives multiple fields at once, emit prefill_info with all of them; if that completes the set, emit confirm_active_card in the same response. Gender defaults to male and smoker to no — ask only if context suggests otherwise

Medical details:
Emit show_medical first, then in the same message ask for height and weight. Once you have height and weight, emit prefill_medical with those values and continue asking the remaining questions one at a time: (1) alcohol consumption, (2) any chronic conditions, (3) hospitalisation in the last 5 years, (4) regular medication, (5) family history of cancer, heart disease, or stroke, (6) hazardous activities. All toggle fields default to none/no — if the user skips one, move on. Only emit confirm_active_card after ALL six questions have been asked AND height and weight are confirmed. If the user provides everything at once, emit prefill_medical with all fields and confirm_active_card together

── NEEDS ASSESSMENT ────────────────────────────────────────────
Run this once, immediately after personal details are confirmed (stage info_collected). Ask the three questions one at a time across separate turns — never bundle them into one message:
Turn 1: ask about any outstanding mortgage or total loans
Turn 2 (once answered or skipped): ask about number of financial dependents
Turn 3 (once answered or skipped): ask about any existing personal life insurance — sum assured and years remaining
After all three are answered or skipped, compute the adjusted cover and emit the quote

Employer or group coverage is NOT personal coverage — flag this clearly if mentioned; note it is tied to employment, not portable, and typically covers only 2–4× salary

Once answered or skipped: adjusted cover = min(max(10 × income × 12 + loans − existing personal cover, 50000), 1000000). Briefly explain the figure. Emit show_[plan]_quote with this as data.cover (protection) or derive a sensible premium (savings/investment)

If all three questions were already answered earlier in the conversation, skip asking and emit the quote directly with the adjusted figure
If the user explicitly skips, emit the quote with no data — defaults apply

── REQUESTS BEYOND THE PURCHASE FLOW ───────────────────────────
Help genuinely with any request that serves the user's understanding or decision:
- "Summarise this for my wife" or "share-friendly version" → compose a clean text summary in your message: plan type, cover amount, term, monthly cost, maturity or payout if applicable, nominated beneficiary if known — no new action needed
- Coverage questions, jargon, exclusions, tax treatment, claims process → answer directly, then re-engage the journey naturally
- "Compare with my existing policy" → run the full document comparison below
- Any insurance-related question at any point → answer it; do not redirect or deflect

── DOCUMENT HANDLING ────────────────────────────────────────────
Government-issued photo ID (passport, driving licence, national ID, residence permit):
  If passport not yet verified: extract name, DOB, gender. If name already known, compare to "${u.name}" — match → emit passport_verified; mismatch → tell the user clearly. Emit prefill_info with all extractable fields. State exactly what was found and what is still missing
  If passport already verified: acknowledge briefly; action none

Insurance document or quotation:
  Extract: insurer, plan type, sum assured, monthly premium, remaining term, key features, visible exclusions
  Map the plan type: term/pure protection → protection; endowment/money-back → savings; ULIP/unit-linked → investment
  Compare against Life Guard: which has higher cover, which is cheaper per month, whether the types are truly comparable, how much term remains vs a fresh start, whether the existing policy is employer or group-tied
  Give an honest verdict — if the existing policy is better value say so clearly; do not oversell Life Guard
  If the user wants to switch to the equivalent Life Guard plan, emit select_plan with the detected type

Any other document:
  Describe what it is. Emit prefill_info with any visible personal fields (name, email, DOB). Redirect to the current step; action none if nothing relevant is found

── PLAN TERMINOLOGY ─────────────────────────────────────────────
protection → term plan, term insurance, term life, pure protection, pure life cover
savings → endowment, money back, guaranteed savings, savings plan
investment → ULIP, unit linked, market linked, wealth plan, investment plan

When the user names a plan type in natural language:
- No personal details collected yet → emit select_plan immediately
- Details already collected → warn that switching clears progress and ask if they want to proceed (action none). Only emit select_plan on the following turn if they confirm; if they decline, continue the current journey
- You have just given the plan-switch warning: on the very next turn the ONLY valid actions are select_plan, reset_to_plan_selection, or none — do NOT emit confirm_active_card regardless of what the user says, since their reply is answering your plan-change question

── AFFORDABILITY ────────────────────────────────────────────────
Savings/investment: if the intended premium exceeds 20% of income, flag the concern and suggest adjusting before emitting the quote
Protection: premium is only known at acceptance. If the accepted premium exceeds 20% of income, acknowledge, flag the concern, suggest adjusting cover or term, and wait for explicit confirmation before emitting show_illustration

── CONFIRMATION DETECTION ───────────────────────────────────────
When activeCard is set and is not plan_card, nom_card, sig_card, or pay_card — check your immediately preceding message first:
- It contained a yes/no question → treat yes, no, yeah, nope as answering that question; do NOT emit confirm_active_card regardless of activeCard
- It contained no question AND the user's message is solely a confirmation word (yes, sure, ok, proceed, go ahead, looks good, fine, yep, absolutely) → emit confirm_active_card
- Confirmation word plus a question or qualifier → answer the question; action none
- plan_card active → ask the user to pick from the options above the chat bar
- info_card active → if all 4 required fields are present emit confirm_active_card; otherwise ask for the missing ones
- med_card active → if height and weight are present emit confirm_active_card; otherwise ask for them
- sig_card active → ask the user to draw their signature on the canvas
- pay_card active → ask the user to fill in their card details in the panel above

── SENSITIVE SCENARIOS ──────────────────────────────────────────
Recent bereavement: acknowledge warmly, pause the journey. Resume exactly where you left off when the user signals readiness — do not repeat completed steps
Terminal or serious diagnosis: express empathy; note pre-existing conditions must be disclosed; do not proceed without acknowledgment
Anxiety about mortality: gently reframe — this policy is an act of love for the people who depend on them
Cannot afford much: help find minimum viable coverage; do not default to 120× income
Employer insurance mentioned: acknowledge the benefit; note it ends with the job, is typically 2–4× salary, and cannot be personalised; recommend a personal policy as the portable permanent foundation; re-engage based on current stage

── RULES ────────────────────────────────────────────────────────
- JSON only — no markdown, no extra text outside the JSON object
- Responses warm and concise (2–3 sentences). Never end with a period — drop all terminal punctuation for a casual, conversational feel
- During info or medical collection (info_card or med_card active), ALWAYS include a message — acknowledge what was received, show any calculated value (e.g. BMI), and ask the next question or confirm completion. Never emit message:"" during collection. Outside collection, set "message" to "" only for a single unambiguous field value where the action itself is sufficient feedback
- Never invent premium, maturity, or surrender figures — the app calculates all numbers
- Do not re-trigger stages already completed
- If the user wants to change something on a confirmed card: "You can edit it by double-clicking (desktop) or double-tapping (mobile) on the card" — action none
- Never assume or fabricate field values not explicitly provided in conversation or document`;

// ── API layer ──
async function callAPI(userMsg,imgData=null){
  S.conv.push({role:'user',content:userMsg});
  showTyping(true);
  try{
    const body={messages:S.conv,systemPrompt:buildSysPrompt()};
    if(imgData)body.imageData=imgData;
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'API error');
    const text=data.content?.[0]?.text||'';
    S.conv.push({role:'assistant',content:text});
    return parseResp(text);
  }catch(e){S.conv.pop();return{message:"I'm having a little trouble right now — please try again in a moment",action:{type:'none'}};}
  finally{showTyping(false);}
}

function parseResp(text){
  try{return JSON.parse(text);}
  catch{const m=text.match(/\{[\s\S]*\}/);if(m)try{return JSON.parse(m[0]);}catch{}return{message:text,action:{type:'none'}};}
}

// ── Attachment ──
function clearAttachment(){
  _attachFile=null;
  G('attach-preview').style.display='none';
  G('attach-btn').classList.remove('active');
  G('chat-file').value='';
  snd.disabled=!inp.value.trim()||S.busy;
}
G('attach-btn').addEventListener('click',()=>G('chat-file').click());
G('chat-file').addEventListener('change',function(){
  const file=this.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    _attachFile={base64:e.target.result.split(',')[1],mediaType:file.type||'application/octet-stream',name:file.name};
    G('attach-name').textContent=file.name;
    G('attach-preview').style.display='flex';
    G('attach-btn').classList.add('active');
    snd.disabled=S.busy;
  };

});
G('attach-clear').addEventListener('click',clearAttachment);

// ── Flow engine ──
async function executeAction(action){
  if(!action||action.type==='none')return;
  await delay(360);
  switch(action.type){
    case 'show_plan_selector':    renderPlans();break;
    case 'show_info_form':        renderInfoForm();break;
    case 'show_protection_quote': if(action.data?.cover!==undefined)S.q.cover=action.data.cover;if(action.data?.term!==undefined)S.q.term=action.data.term;renderProtQuote();break;
    case 'show_savings_quote':    if(action.data?.premium!==undefined)S.q.premium=action.data.premium;if(action.data?.term!==undefined)S.q.term=action.data.term;renderSavQuote();break;
    case 'show_investment_quote': if(action.data?.premium!==undefined)S.q.premium=action.data.premium;if(action.data?.term!==undefined)S.q.term=action.data.term;if(action.data?.fund!==undefined)S.q.fund=action.data.fund;renderInvQuote();break;
    case 'show_illustration':     renderIllustration();break;
    case 'show_medical':          renderMedical();break;
    case 'show_signature':        renderSignature();break;
    case 'show_nominee':          renderNominee();break;
    case 'prefill_nominee':       handlePrefillNominee(action.data);break;
    case 'select_plan':           handleSelectPlan(action.data);break;
    case 'prefill_info':          handlePrefillInfo(action.data);break;
    case 'prefill_quote':         handlePrefillQuote(action.data);break;
    case 'prefill_medical':       handlePrefillMedical(action.data);break;
    case 'confirm_active_card':   handleConfirmActiveCard();break;
    case 'passport_verified':     await handlePassportVerified();break;
    case 'reset_to_plan_selection': editCard('plan_card','start',true);break;
  }
}

function handleSelectPlan(data){
  const plan=data?.plan;
  if(!['protection','savings','investment'].includes(plan))return;
  const hadDetails=!!(S.u.name&&S.u.dob&&S.u.income);
  S.u.plan=plan;
  if(plan==='protection'){
    S.q.cover=S.u.income?Math.min(120*S.u.income,1000000):500000;
    const age=S.u.dob?getAge(S.u.dob):35;
    S.q.term=Math.max(10,Math.min(30,65-Math.round(age)));
  }else{
    S.q.premium=S.u.income?Math.max(100,Math.min(10000,Math.round(S.u.income*0.1))):500;
    S.q.term=10;S.q.fund='balanced';
  }
  hidePanel();
  if(hadDetails){
    S.medVals={alc:'none',cc:'no',hosp:'no',medic:'no',fhist:'no',haz:'no',height:0,weight:0};
    S.nominees=[];
    editCard('info_card','plan_selected',true);
  }else{
    S.stage='plan_selected';
    renderInfoForm();
  }
}

function handlePrefillInfo(data){
  prefillInfoCard(data);
}

function handlePrefillQuote(data){
  const p=S.u.plan;
  if(p==='protection'&&G('prot_card')){
    if(data.cover!==undefined)G('pc_csl').value=data.cover;
    if(data.term!==undefined)G('pc_tsl').value=data.term;
    upProtQ();
    const comp=G('prot_card').closest('.comp');if(comp){msgs.appendChild(comp);scroll();}
  }else if(p==='savings'&&G('sav_card')){
    if(data.premium!==undefined)G('sv_psl').value=data.premium;
    if(data.term!==undefined)G('sv_tsl').value=data.term;
    upSavQ();
    const comp=G('sav_card').closest('.comp');if(comp){msgs.appendChild(comp);scroll();}
  }else if(p==='investment'&&G('inv_card')){
    if(data.premium!==undefined)G('iv_psl').value=data.premium;
    if(data.term!==undefined)G('iv_tsl').value=data.term;
    if(data.fund){const el=document.querySelector(`#fund_opts .fnd[onclick*="${data.fund}"]`);if(el)pickFund(data.fund,el);}
    upInvQ();
    const comp=G('inv_card').closest('.comp');if(comp){msgs.appendChild(comp);scroll();}
  }
}

function handlePrefillMedical(data){
  if(data.height!==undefined)S.medVals.height=Number(data.height);
  if(data.weight!==undefined)S.medVals.weight=Number(data.weight);
  ['alc','cc','hosp','medic','fhist','haz'].forEach(f=>{
    if(data[f]!==undefined)S.medVals[f]=data[f];
  });
}

let _silentConfirm=false;
function handleConfirmActiveCard(){
  const id=S.activeCard;if(!id)return;
  if(id==='sig_card'){addBot("Please draw your signature on the canvas — I can't do that part for you");return;}
  if(id==='pay_card'){addBot("Please fill in your card details in the panel above to complete payment");return;}
  if(id==='plan_card'){addBot("Please pick a plan from the options above the chat bar");return;}
  if(id==='nom_card'){addBot("Please fill in your nominee details in the panel above — I can't do that part for you");return;}
  if(id==='info_card'){
    if(checkInfo()){_silentConfirm=true;submitInfo();}
    else addBot("I still need a few things — your name, email, date of birth, and monthly income");
    return;

function renderSignature(){

  addComp(`<div class="card" id="sig_card">

    <p style="font-size:12px;color:var(--t2);margin-bottom:12px;line-height:1.6">By signing below, you confirm that all information provided in this application is accurate and complete to the best of your knowledge</p>
    <canvas id="sigc"></canvas>
    <div class="sgh">Draw your signature above</div>
    <button class="gbtn" onclick="clearSig()">Clear</button>
    <button class="btn" onclick="submitSig()">Submit signature ${ic.arrow}</button>
  </div>`);
  initSigPad();
}

function initSigPad(){
  const canvas=G('sigc'),ctx=canvas.getContext('2d'),dpr=window.devicePixelRatio||1,w=canvas.offsetWidth||400;
  canvas.width=w*dpr;canvas.height=145*dpr;ctx.scale(dpr,dpr);ctx.strokeStyle='#0BAF88';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';let drawing=false;
  function pos(e){const r=canvas.getBoundingClientRect(),src=e.touches?e.touches[0]:e;return{x:(src.clientX-r.left)*(canvas.width/dpr/r.width),y:(src.clientY-r.top)*(canvas.height/dpr/r.height)};}
  function start(e){e.preventDefault();drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}
  function move(e){if(!drawing)return;e.preventDefault();const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();}
  function end(){drawing=false;}
  canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);canvas.addEventListener('mouseup',end);canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',end);
  window._sigCtx=ctx;window._sigCanvas=canvas;
}

function clearSig(){const c=window._sigCanvas;if(c)window._sigCtx.clearRect(0,0,c.width,c.height);}

async function submitSig(){
  const c=window._sigCanvas;if(!c)return;
  const data=c.getContext('2d').getImageData(0,0,c.width,c.height).data;
  if(!Array.from(data).some((v,i)=>i%4===3&&v>0)){addBot("Please draw your signature on the canvas before proceeding");return;}
  lockCard('sig_card');S.stage='signed';
  S.busy=true;setActive(false);
  addUser('Signature submitted');
  await delay(400);
  renderPayment();
  S.busy=false;setActive(true);
}

    <div class="pnl-hd">${ic.card} First premium payment</div>
    <div class="cnets"><div class="cnet">VISA</div><div class="cnet">MC</div><div class="cnet">AMEX</div></div>
    <div class="payamt"><span class="payamt-l">First month premium</span><span class="payamt-v">${fmt(amount)}</span></div>
    <div class="flds">
      <input class="fi" id="py_name" type="text" placeholder="Name on card">
      <input class="fi" id="py_card" type="tel" placeholder="Card number" maxlength="19" oninput="fmtCard(this)">
      <div class="pay2"><input class="fi" id="py_exp" type="tel" placeholder="MM / YY" maxlength="7" oninput="fmtExp(this)"><input class="fi" id="py_cvv" type="tel" placeholder="CVV" maxlength="4" style="flex:0 0 80px"></div>
    </div>
    <div class="phi">${ic.lock} Secure payment &nbsp;·&nbsp; Test mode: any valid card format accepted</div>
    <button class="pnl-sub" id="pay_btn" onclick="submitPay('${fmt(amount)}')">Pay ${fmt(amount)} ${ic.arrow}</button>
  </div>`);
}

function fmtCard(el){let v=el.value.replace(/\D/g,'').slice(0,16);el.value=v.match(/.{1,4}/g)?.join(' ')||v;}
function fmtExp(el){let v=el.value.replace(/\D/g,'');if(v.length>2)v=v.slice(0,2)+' / '+v.slice(2,4);el.value=v;}

async function submitPay(fmtAmt){
  const nm=G('py_name').value.trim(),cd=G('py_card').value.replace(/\s/g,''),ex=G('py_exp').value.replace(/[\s\/]/g,''),cv=G('py_cvv').value.trim();
  let err=false;
  if(!nm){G('py_name').classList.add('err');err=true;}else G('py_name').classList.remove('err');
  if(cd.length<13){G('py_card').classList.add('err');err=true;}else G('py_card').classList.remove('err');
  if(ex.length<3){G('py_exp').classList.add('err');err=true;}else G('py_exp').classList.remove('err');
  if(cv.length<3){G('py_cvv').classList.add('err');err=true;}else G('py_cvv').classList.remove('err');
  if(err)return;
  const btn=G('pay_btn');btn.disabled=true;btn.textContent='Processing…';
  await delay(1800);
  hidePanel();S.stage='paid';S.busy=true;setActive(false);
  addUser(`Payment of ${fmtAmt} processed`);
  const resp=await callAPI(`Payment was successful — please show the nominee collection screen now`);
  if(resp.message&&resp.message.trim())addBot(resp.message);await executeAction(resp.action);S.busy=false;setActive(true);
}

// ── Nominees — panel ──
let _nomIdx=0;
function renderNominee(){
  if(G('nom_rows'))return;
  S.activeCard='nom_card'; _nomIdx=0;
  showPanel(`<div class="pnl">
    <div class="pnl-hd">Your beneficiaries</div>
    <p style="font-size:12px;color:var(--t2);margin-bottom:13px;line-height:1.6">Tell us who should receive the policy benefit — up to 3 nominees</p>
    <div id="nom_rows"></div>
    <button class="gbtn" id="nom_add" onclick="addNomRow()" style="margin-bottom:10px">+ Add another nominee</button>
    <div class="nom-bar"><div class="nom-bar-fill" id="nom_fill" style="width:0%"></div></div>
    <div class="nom-stats">
      <div><div class="nom-stat-l">Allocated</div><div class="nom-stat-v" id="nom_alloc" style="color:var(--red)">0%</div></div>
      <div style="text-align:right"><div class="nom-stat-l">Remaining</div><div class="nom-stat-v" id="nom_rem" style="color:var(--t2)">100%</div></div>
    </div>
    <button class="pnl-sub" id="nom_btn" disabled onclick="submitNominee()">Confirm nominees ${ic.arrow}</button>
  </div>`);
  addNomRow(100);
}

function addNomRow(initPct){
  const i=_nomIdx++;
  if(initPct===undefined){
    const existing=[...G('nom_rows').querySelectorAll('.nom-row')];
    const n=existing.length+1,even=Math.floor(100/n),rem=100-(even*n);
    existing.forEach((r,ri)=>{const pi=r.dataset.idx;const el=G(`nom_p_${pi}`);if(el)el.value=even+(ri===0?rem:0);});
    initPct=even;
  }
  const row=document.createElement('div');
  row.className='nom-row';row.dataset.idx=i;
  row.innerHTML=`
    <input class="fi" id="nom_n_${i}" type="text" placeholder="Nominee full name" oninput="checkNoms()">
    <div class="nom-spl">
      <div style="flex:1"><select class="fi" id="nom_r_${i}" onchange="checkNoms()">
        <option value="">Relationship</option>
        <option>Spouse</option><option>Child</option><option>Parent</option><option>Sibling</option><option>Other</option>
      </select></div>
      <div class="nom-pct">
        <input class="fi" id="nom_p_${i}" type="number" min="1" max="100" value="${initPct}" oninput="checkNoms()">
        <span class="nom-pct-sym">%</span>
      </div>
      ${i>0?`<button class="nom-del" onclick="removeNomRow(${i})" type="button">×</button>`:''}
    </div>`;
  G('nom_rows').appendChild(row);
  if(_nomIdx>=3)G('nom_add').style.display='none';
  checkNoms();
}

function removeNomRow(i){
  const row=G('nom_rows').querySelector(`[data-idx="${i}"]`);
  if(row)row.remove();
  G('nom_add').style.display='';
  checkNoms();
}

function checkNoms(){
  let total=0,allValid=true;
  G('nom_rows').querySelectorAll('.nom-row').forEach(row=>{
    const i=row.dataset.idx;
    const name=G(`nom_n_${i}`)?.value.trim();
    const rel=G(`nom_r_${i}`)?.value;
    const pct=Number(G(`nom_p_${i}`)?.value);
    if(!name||name.length<2||!rel||!pct||pct<1)allValid=false;
    total+=pct||0;
  });
  const rem=100-total,ok=total===100&&allValid;
  G('nom_fill').style.width=Math.min(total,100)+'%';
  G('nom_fill').style.background=total>100?'var(--red)':'var(--a)';
  G('nom_alloc').textContent=total+'%';
  G('nom_alloc').style.color=total===100?'var(--a)':total>100?'var(--red)':'var(--tx)';
  G('nom_rem').textContent=rem+'%';
  G('nom_rem').style.color=rem===0?'var(--t3)':'var(--t2)';
  G('nom_btn').disabled=!ok;
}

function handlePrefillNominee(nominees){
  if(!G('nom_rows')||!nominees?.length)return;
  G('nom_rows').innerHTML='';_nomIdx=0;G('nom_add').style.display='';
  nominees.forEach(n=>{
    const idx=_nomIdx;
    addNomRow(n.share??Math.floor(100/nominees.length));
    if(n.name&&G(`nom_n_${idx}`))G(`nom_n_${idx}`).value=n.name;
    const sel=G(`nom_r_${idx}`);
    if(sel&&n.relationship)[...sel.options].forEach(o=>{if(o.value.toLowerCase()===n.relationship.toLowerCase())sel.value=o.value;});
  });
  checkNoms();
}

async function submitNominee(){
  const nominees=[];
  G('nom_rows').querySelectorAll('.nom-row').forEach(row=>{
    const i=row.dataset.idx;
    nominees.push({name:G(`nom_n_${i}`).value.trim(),relationship:G(`nom_r_${i}`).value,share:Number(G(`nom_p_${i}`).value)});
  });
  S.nominees=nominees;
  hidePanel();S.stage='nominee_done';
  S.busy=true;setActive(false);
  addUser('Nominees: '+nominees.map(n=>`${n.name} (${n.relationship}) ${n.share}%`).join(' · '));
  await delay(400);
  renderConfirmation();
}

// ── Confirmation — message ──
function renderConfirmation(){
  if(S.stage==='completed')return;
  const first=S.u.name.split(' ')[0];
  const nomList=S.nominees?.length
    ?'\n\nYour '+(S.nominees.length===1?'beneficiary':'beneficiaries')+': '+S.nominees.map(n=>`${n.name} (${n.relationship}) — ${n.share}%`).join(' · ')
    :'';
  addBot(`You're all set, ${first}! 🎉\n\nYou've done the second most important thing by purchasing a life insurance policy — what comes first is staying healthy so your family and loved ones never have to use it${nomList}\n\nYou'll receive your policy copy within the next 24 hours at ${S.u.email}\n\nYou can also reach us at help@life-guard.com — please use the same email address as on your application so we can identify you faster`);
  S.stage='completed';inp.placeholder='Your application is being processed…';inp.disabled=true;snd.disabled=true;
}

// ── Input events ──
inp.addEventListener('input',()=>{resizeInp();snd.disabled=(!inp.value.trim()&&!_attachFile)||S.busy;});
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendUserMsg();}});
snd.addEventListener('click',sendUserMsg);

// ── Init ──
setTimeout(()=>{G('typing').style.display='flex';scroll();},300);
setTimeout(()=>{G('typing').style.display='none';addBot("Welcome to Life Guard — what are you looking for in a life insurance policy?");renderPlans();setActive(true);},900);
</script>
</body>
</html>
